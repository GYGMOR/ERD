services:
  app:
    image: ghcr.io/gygmor/erd:latest
    container_name: tool_app
    networks:
      - web
    env_file:
      - .env
    restart: always
    ports:
      - "3002:3001"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: tool_db
    restart: always
    environment:
      POSTGRES_USER: sysadmin
      POSTGRES_PASSWORD: rzP3MHh?ZDckRe # <--- ÄNDERE DAS!
      POSTGRES_DB: nexservice
    ports:
      - "5432:5432"
    networks:
      - web
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: tool_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hed-it.ch # <--- Deine Login-Mail für pgAdmin
      PGADMIN_DEFAULT_PASSWORD: admin # <--- Dein Login-Passwort für pgAdmin
    ports:
      - "5050:80" # pgAdmin ist dann über http://DEINE-SERVER-IP:5050 erreichbar
    networks:
      - web
    depends_on:
      - db

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    restart: always

networks:
  web:
    external: true

volumes:
  postgres_data:
