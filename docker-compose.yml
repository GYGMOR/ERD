services:
  app:
    image: ghcr.io/gygmor/erd:latest
    ports:
      - "3002:3001"
    env_file:
      - .env
    restart: always

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    restart: always
